runtime: python
env: flex

runtime_config:
  python_version: 3.11

env_variables:
  DJANGO_SETTINGS_MODULE: pawnshop_management.settings
  DEBUG: False
  SECRET_KEY: your-secret-key-here  # Generate a secure key
  DATABASE_URL: sqlite:///db.sqlite3  # For SQLite, or configure PostgreSQL

handlers:
- url: /static/
  static_dir: staticfiles/
  
- url: /media/
  static_dir: media/

- url: /.*
  script: auto

automatic_scaling:
  min_num_instances: 1
  max_num_instances: 5
  cool_down_period_sec: 120
  cpu_utilization:
    target_utilization: 0.6

resources:
  cpu: 1
  memory_gb: 2
  disk_size_gb: 10

readiness_check:
  path: "/login/"
  check_interval_sec: 5
  timeout_sec: 4
  app_start_timeout_sec: 300
